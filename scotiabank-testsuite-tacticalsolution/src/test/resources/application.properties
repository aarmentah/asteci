api.base.uri=https://ibbaas-customer-validation.int.dbuist.npe-k8s.recursos
api.access.token=replace-with-valid-bearer-token

# Token automático vía Passport IST (mismo ambiente que el API dbuist)
# GET .../client-credentials/48cf7cec-2dfe-4695-a3b1-eb423fc6418c
# Si api.access.token tiene un valor real, tiene prioridad sobre Passport.
passport.base.uri=https://banco.ist.npe-k8s.ib.bns/ibwork/ib-testing-security-client/client-credentials
passport.token.path=/48cf7cec-2dfe-4695-a3b1-eb423fc6418c

# Customer Summary (UAT)
customer.summary.api.base.uri=https://baas-customer-summary.int.dbuuat.npe-k8s.recursos
customer.summary.api.access.token=replace-with-valid-bearer-token
customer.summary.passport.base.uri=https://banco.uat.npe-k8s.ib.bns/ibwork/ib-testing-security-client/client-credentials
customer.summary.passport.token.path=/c5e3d83f-feb5-40c7-97a2-d186b47ea2b6

# Customer Lookup (UAT)
customer.lookup.api.base.uri=https://baas-customer-lookup.int.dbuuat.npe-k8s.recursos
customer.lookup.api.access.token=replace-with-valid-bearer-token
customer.lookup.passport.base.uri=https://banco.uat.npe-k8s.ib.bns/ibwork/ib-testing-security-client/client-credentials
customer.lookup.passport.token.path=/c5e3d83f-feb5-40c7-97a2-d186b47ea2b6

# Keymaster (UAT) — surrogate keys compartido por customer-summary y customer-lookup
keymaster.base.uri=https://baas-keymaster.int.dbuuat.npe-k8s.recursos
keymaster.surrogate.path=/v1/keymaster/surrogate_keys
